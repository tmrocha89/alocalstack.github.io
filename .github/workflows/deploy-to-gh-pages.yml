# GitHub Pages deploy for alocalstack (static Vite build)
# Triggered on push to main. Deploys using GitHub Actions.
# The app is pure client-side; at runtime the user configures their own LocalStack endpoint (tunnel recommended for https-hosted Pages).
# Automatically uses base=/ only for real user/org sites (repo name exactly matches <owner>.github.io).
# For any other repo (including ones named *.github.io under a different owner), uses /<repo-name>/.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Determine base path (root ONLY for real <owner>.github.io user/org sites)
        id: base
        shell: bash
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [[ "${REPO_NAME,,}" == "${OWNER,,}.github.io" ]]; then
            echo "base=/" >> $GITHUB_OUTPUT
            echo "Detected real user/org site (${REPO_NAME}) - using base=/"
          else
            echo "base=/$REPO_NAME/" >> $GITHUB_OUTPUT
            echo "Project site - using base=/$REPO_NAME/"
          fi

      - name: Build for GitHub Pages
        # VITE_BASE is consumed in vite.config.ts
        run: npm run build
        env:
          VITE_BASE: ${{ steps.base.outputs.base }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
