services:
  localstack:
    container_name: '${LOCALSTACK_DOCKER_NAME:-localstack-main}'
    image: localstack/localstack:3.0
    ports:
      - '127.0.0.1:4566:4566' # LocalStack Gateway
      - '127.0.0.1:4510-4559:4510-4559' # external services port range
      - '127.0.0.1:443:443' # LocalStack HTTPS Gateway (Pro)
    environment:
      - DEBUG=${DEBUG:-1}
      - PERSISTENCE=${PERSISTENCE:-0}
      # Broad CORS configuration for browser-based UIs talking directly to LocalStack.
      # The browser origin (localhost:5173 in dev) must be allowed, and the SDK sends
      # extra headers like x-amz-sdk-checksum-algorithm during uploads.
      # Using "*" is simplest and works well for local dev.
      - EXTRA_CORS_ALLOWED_ORIGINS=*
      - EXTRA_CORS_ALLOWED_HEADERS=*
      - EXTRA_CORS_EXPOSE_HEADERS=*
      # The UI also applies a per-bucket CORS policy automatically (see "Configure CORS"
      # button and ensureBucketCors in code) for the current window.location.origin.
      # If you still see preflight issues with x-amz-sdk-checksum-algorithm etc.,
      # restart this service after setting the vars above.
    volumes:
     # - '${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack'
      - '/var/run/docker.sock:/var/run/docker.sock'